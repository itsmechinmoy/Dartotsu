name: Dantotsu Build Workflow
on:
  push:
    branches:
      - main
    
jobs:
  build_android:
    runs-on: ubuntu-latest
    if: "contains(github.event.head_commit.message, '[build.apk]') || contains(github.event.head_commit.message, '[build]')"
    outputs:
      apk_link: ${{steps.gdriveUpload.outputs.web-content-link}}
      version: ${{steps.version.outputs.version}}

    permissions:
      contents: write
      pull-requests: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Shallow clone for faster checkout

      # Set up version
      - name: Set Version
        id: version
        run: |
          echo "version=$(grep 'version:' pubspec.yaml | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      # Cache Flutter dependencies with improved keys
      - uses: actions/cache@v4
        id: flutter-cache
        with:
          path: |
            ~/.pub-cache
            build/
            .dart_tool/
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ env.FLUTTER_HOME }}/.pub-cache
          key: ${{ runner.os }}-flutter-gradle-${{ hashFiles('**/pubspec.lock', '**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-flutter-gradle-
            ${{ runner.os }}-flutter-

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"  # Using Temurin instead of Oracle for better licensing
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1
          cache: true
          cache-key: flutter-:os:-:channel:-:version:-:arch:-:hash

      # Download and setup keystore
      - name: Setup Keystore
        run: |
          echo "${{ secrets.APK_SIGN }}" | base64 --decode > android/app/dartotsu.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS}}" >> android/key.properties
          echo "storeFile=dartotsu.jks" >> android/key.properties

      # Optimize Gradle
      - name: Configure Gradle
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError" > ~/.gradle/gradle.properties
          echo "org.gradle.daemon=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.caching=true" >> ~/.gradle/gradle.properties
          echo "android.enableR8.fullMode=true" >> ~/.gradle/gradle.properties
          echo "android.enableJetifier=false" >> ~/.gradle/gradle.properties

      # Build APKs for all ABIs
      - name: Build APKs
        run: |
          flutter pub get --no-example
          flutter build apk --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-info

      - name: Rename and Move APKs
        run: |
          mkdir -p build/outputs
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/outputs/Dantotsu_arm_${{github.ref_name}}.apk
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/outputs/Dantotsu_arm64_${{github.ref_name}}.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk build/outputs/Dantotsu_x64_${{github.ref_name}}.apk

      # Upload arm64 version (primary)
      - name: Upload ARM64 to Google Drive
        id: gdriveUpload
        uses: hoatruongdev09/google-drive-file-upload-github-action@v1.1
        with:
          file-path: build/outputs/Dantotsu_arm64_${{github.ref_name}}.apk
          upload-name: Dantotsu_arm64.apk
          upload-to-folder-id: 1nWYex54zd58SVitJUCva91_4k1PPTdP3
          service-account-json: "${{secrets.GOOGLE_KEY}}"
          overrwrite: true

      # Upload arm version
      - name: Upload ARM to Google Drive
        uses: hoatruongdev09/google-drive-file-upload-github-action@v1.1
        with:
          file-path: build/outputs/Dantotsu_arm_${{github.ref_name}}.apk
          upload-name: Dantotsu_arm.apk
          upload-to-folder-id: 1nWYex54zd58SVitJUCva91_4k1PPTdP3
          service-account-json: "${{secrets.GOOGLE_KEY}}"
          overrwrite: true

      # Upload x64 version
      - name: Upload x64 to Google Drive
        uses: hoatruongdev09/google-drive-file-upload-github-action@v1.1
        with:
          file-path: build/outputs/Dantotsu_x64_${{github.ref_name}}.apk
          upload-name: Dantotsu_x64.apk
          upload-to-folder-id: 1nWYex54zd58SVitJUCva91_4k1PPTdP3
          service-account-json: "${{secrets.GOOGLE_KEY}}"
          overrwrite: true

      # Upload debug symbols if needed
      - name: Upload Debug Symbols
        if: "contains(github.event.head_commit.message, '[symbols]')"
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols
          path: build/debug-info/
          retention-days: 14
